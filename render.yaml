services:
  - type: web
    name: sec-stock-analyzer
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SEC_USER_AGENT
        sync: false
      - key: SEC_CONTACT_EMAIL
        sync: false
      - key: OPENDART_API_KEY
        sync: false
      - key: STOCK_PRICE_API_KEY
        sync: false
